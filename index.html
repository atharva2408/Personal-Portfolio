<!DOCTYPE html>
<html>

<head>
    <title>Atharva Yanna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="icon-style.css">
    <link rel="icon" type="image/svg+xml" href="/assets/icon/vs-code-svg.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
</head>

<body>

    <!-- TOP MENU BAR -->
    <div class="top-bar">
        <div class="menu">
            <div>
                <image src="assets/icon/vs-code-svg.svg" class="vs-code-logo" />
            </div>
            <span>File</span>
            <span>Edit</span>
            <span>Selection</span>
            <span>View</span>
            <span>Go</span>
            <span>Run</span>
            <span>Terminal</span>
            <span>Help</span>
        </div>
        <div class="search-box">
            <image src="assets/icon/icons8-search.svg" class="search-icon" />
            <span>VS Code Portfolio</span>
        </div>
        <div class="layout-icons">

        </div>
    </div>

    <div class="main">
        <!-- ACTIVITY BAR -->
        <div class="activity-bar">
            <div class="files-div">
                <image src="assets/icon/file-svg.svg" class="file-icon" />
            </div>
            <div>
                <image src="assets/icon/search-activity-icon.svg" />
            </div>
            <div>
                <image src="assets/icon/icons8-code-fork-48.png" class="git-icon" />
            </div>
            <div class="setting-icon">
                <image src="assets/icon/settings-icon.svg" class="settings-icon" />
            </div>
        </div>

        <!-- EXPLORER -->
        <div class="explorer">
            <div class="explorer-title">
                <span>EXPLORER</span>
                <image src="assets/icon/options-svgrepo-com.svg" class="explorer-options-icon" />
            </div>
            <div class="files-container">
                <div class="files-title">
                    <image src="assets/icon/Dropdown icon.svg" />
                    Personal Portfolio
                </div>
                <div class="files">
                    <div class="file">
                        <image src="assets/icon/markdown-svgrepo-com.svg" class="md-file-icon" />
                        About.md
                    </div>
                    <div class="file">
                        <image src="assets/icon/markdown-svgrepo-com.svg" class="md-file-icon" />
                        Experience.md
                    </div>
                    <div class="file">
                        <image src="assets/icon/markdown-svgrepo-com.svg" class="md-file-icon" />
                        Projects.md
                    </div>
                    <div class="file">
                        <image src="assets/icon/markdown-svgrepo-com.svg" class="md-file-icon" />
                        Education.md
                    </div>
                    <div class="file">
                        <image src="assets/icon/markdown-svgrepo-com.svg" class="md-file-icon" />
                        Contact.md
                    </div>
                </div>
            </div>
        </div>

        <!-- EDITOR AREA -->
        <div class="editor">
            <div class="tabs">
                <div class="tab">
                    <image src="assets/icon/markdown-svgrepo-com.svg" class=""/>
                    <span>About.md</span>
                </div>
                <div class="tab">
                    <image src="assets/icon/markdown-svgrepo-com.svg" class=""/>
                    <span>Experience.md</span>
                </div>
                <div class="tab">
                    <image src="assets/icon/markdown-svgrepo-com.svg" class=""/>
                    <span>Projects.md</span>
                </div>
                <div class="tab">
                    <image src="assets/icon/markdown-svgrepo-com.svg" class=""/>
                    <span>Education.md</span>
                </div>
                <div class="tab">
                    <image src="assets/icon/markdown-svgrepo-com.svg" class=""/>
                    <span>Contact.md</span>
                </div>
                <div class="editor-btn-icons">
                    <image src="assets/icon/play-svgrepo-com.svg" class="play-icon"/>
                    <image src="assets/icon/git-diff-svgrepo-com.svg" class="play-icon"/>
                    <image src="assets/icon/options-svgrepo-com.svg" class="explorer-options-icon"/>
                </div>
            </div>

            <div class="">

            </div>

        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="bottom-arrows">
            <image src="assets/icon/Bottom-2arows.svg" class="bottom-arrows-icon" />
        </div>
        <span>development/portfolio</span>
        <span>Ln 1, Col 1</span>
        <span>UTF-8</span>
        <span>HTML</span>
    </div>

    <script src="script.js"></script>
</body>

</html>
